esphome:
  name: geekmagic
  friendly_name: Mini Display TV

esp8266:
  board: esp01_1m

logger:

# Enable Home Assistant API
api:

web_server:
  port: 80

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini-Display-Tv"
    password: "12345678"

captive_portal:

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd
    
# status_led:
#   pin: GPIO2
  
output:
  - platform: esp8266_pwm
    pin: GPIO05
    frequency: 200 Hz
    inverted: true
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_AND_ON

font:
  - file: "gfonts://Roboto@700"
    id: font_clock
    size: 42
  - file: "gfonts://Roboto"
    id: font_date
    size: 16
  - file: "gfonts://Roboto@500"
    id: font_label
    size: 14
  - file: "gfonts://Roboto@700"
    id: font_value
    size: 14

color:
  - id: color_cyan
    hex: "00BCD4"
  - id: color_yellow
    hex: "FFD54F"
  - id: color_green
    hex: "66BB6A"
  - id: color_orange
    hex: "FFA726"
  - id: color_blue
    hex: "42A5F5"
  - id: color_red
    hex: "EF5350"
  - id: color_gray
    hex: "9E9E9E"
  - id: color_white
    hex: "EEEEEE"
  - id: color_dim
    hex: "666666"

display:  
  - platform: mipi_spi
    model: st7789v
    spi_id: spihwd
    dimensions: 
      height: 240
      width: 240
      offset_height: 0
      offset_width: 0
    invert_colors: true    
    dc_pin: GPIO00
    reset_pin: GPIO02
    #backlight_pin: GPIO25
    color_depth: 8
    update_interval: 30s
    id: disp
    spi_mode: mode3
    lambda: |-
      it.fill(Color::BLACK);
      auto now = id(current_time).now();
      if (!now.is_valid()) {
        it.print(120, 110, id(font_label), id(color_gray), TextAlign::CENTER, "Warte auf Daten...");
        return;
      }

      // --- Clock ---
      it.strftime(120, 20, id(font_clock), id(color_cyan), TextAlign::CENTER, "%H:%M", now);
      it.strftime(120, 50, id(font_date), id(color_gray), TextAlign::CENTER, "%a, %d.%m.%Y", now);

      // --- Divider ---
      it.horizontal_line(16, 68, 208, id(color_dim));

      // --- Strom ---
      int y = 76;
      it.printf(10, y, id(font_label), id(color_yellow), "Gesamt");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f kWh", id(gesamt_stromverbrauch).state);

      y += 18;
      it.printf(10, y, id(font_label), id(color_yellow), "Ohne WP");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f kWh", id(hausverbrauch_ohne_wp).state);

      y += 18;
      it.printf(10, y, id(font_label), id(color_yellow), "Heute");
      it.printf(60, y, id(font_value), id(color_white), "%.1f kWh", id(taglicher_stromverbrauch).state);
      it.printf(178, y, id(font_label), id(color_yellow), "WP");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f kWh", id(tag_wp).state);

      // --- Divider ---
      y += 20;
      it.horizontal_line(16, y, 208, id(color_dim));

      // --- Netz & PV ---
      y += 6;
      it.printf(10, y, id(font_label), id(color_orange), "Netzbezug");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f kWh", id(netzbezug).state);

      y += 18;
      it.printf(10, y, id(font_label), id(color_green), "PV");
      it.printf(60, y, id(font_value), id(color_white), "%.1f kWh", id(pv).state);
      it.printf(148, y, id(font_label), id(color_green), "Einsp.");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f kWh", id(pv_eingespeist).state);

      // --- Divider ---
      y += 20;
      it.horizontal_line(16, y, 208, id(color_dim));

      // --- Warmwasser ---
      y += 6;
      it.printf(10, y, id(font_label), id(color_blue), "Warmwasser");
      it.printf(130, y, id(font_value), id(color_white), "%.1f C", id(ww_temperatur).state);
      it.printf(178, y, id(font_label), id(color_blue), "Zyklen");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.0f", id(heizzyklen).state);

      // --- Auto ---
      y += 20;
      it.printf(10, y, id(font_label), id(color_red), "Buzz");
      it.printf(60, y, id(font_value), id(color_white), "%.0f %%", id(buzz_battery_level).state);
      it.printf(100, y, id(font_label), id(color_red), "Geladen");
      it.printf(230, y, id(font_value), id(color_white), TextAlign::TOP_RIGHT, "%.1f mWh", id(buzz_gesamt_geladen).state);

time:
  - platform: homeassistant
    id: current_time

sensor:
  - platform: homeassistant
    id: gesamt_stromverbrauch
    entity_id: sensor.gesamt_stromverbrauch_in_kwh
  - platform: homeassistant
    id: hausverbrauch_ohne_wp
    entity_id: sensor.hausverbrauch_ohne_wp
  - platform: homeassistant
    id: netzbezug
    entity_id: sensor.solarnet_power_grid_import
  - platform: homeassistant
    id: ww_temperatur
    entity_id: sensor.hybrox_11_grail_dhw
  - platform: homeassistant
    id: heizzyklen
    entity_id: sensor.tagliche_wp_heizzyklen
  - platform: homeassistant
    id: pv
    entity_id: sensor.solarnet_power_photovoltaics
  - platform: homeassistant
    id: batterie_prozent
    entity_id: sensor.batterie_ladeleistung_entladeleistung
  - platform: homeassistant
    id: buzz_battery_level
    entity_id: sensor.buzz_battery_level
  - platform: homeassistant
    id: buzz_gesamt_geladen
    entity_id: sensor.wattpilot_gesamt
  - platform: homeassistant
    id: pv_eingespeist
    entity_id: sensor.taglich_eingespeist
  - platform: homeassistant
    id: taglicher_stromverbrauch
    entity_id: sensor.taglicher_stromvebrauch
  - platform: homeassistant
    id: tag_wp
    entity_id: sensor.taglich_wp_gesamt