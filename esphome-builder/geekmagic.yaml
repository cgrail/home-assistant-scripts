esphome:
  name: geekmagic
  friendly_name: Mini Display TV

esp8266:
  board: esp01_1m

logger:

# Enable Home Assistant API
api:

web_server:
  port: 80

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mini-Display-Tv"
    password: "12345678"

captive_portal:

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd
    
# status_led:
#   pin: GPIO2
  
output:
  - platform: esp8266_pwm
    pin: GPIO05
    frequency: 200 Hz
    inverted: true
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_AND_ON

font:
  - file: "gfonts://Roboto"
    id: font_clock
    size: 48
  - file: "gfonts://Roboto"
    id: font_date
    size: 20
  - file: "gfonts://Roboto"
    id: font_small
    size: 16

color:
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%

display:  
  - platform: mipi_spi
    model: st7789v
    spi_id: spihwd
    dimensions: 
      height: 240
      width: 240
      offset_height: 0
      offset_width: 0
    invert_colors: true    
    dc_pin: GPIO00
    reset_pin: GPIO02
    #backlight_pin: GPIO25
    color_depth: 8
    #update_interval: never
    update_interval: 60s
    id: disp
    spi_mode: mode3
    lambda: |-
      it.fill(Color::BLACK);

      float energy_kwh = id(total_energy).has_state() && !isnan(id(total_energy).state) 
                   ? id(total_energy).state / 1000.0f 
                   : 0.0f;
      
      auto now = id(current_time).now();
      if (!now.is_valid()) {
        it.print(120, 100, id(font_small), Color::WHITE, TextAlign::CENTER, "Warte auf Zeit...");
        return;
      }
      it.strftime(120, 70, id(font_clock), Color::WHITE, TextAlign::CENTER, "%H:%M", now);
      it.strftime(120, 130, id(font_date), Color(180, 180, 180), TextAlign::CENTER, "%a, %d.%m.%Y", now);
      it.printf(10, 200, id(font_small), Color(255, 0, 0), "Total: %.1f kWh", energy_kwh);

time:
  - platform: homeassistant
    id: current_time

sensor:
  - platform: homeassistant
    id: total_energy
    entity_id: sensor.fronius_total_energy
    internal: false