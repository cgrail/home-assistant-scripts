globals:
  - id: live_anim_step
    type: int
    restore_value: false
    initial_value: '0'

sensor:
  - platform: homeassistant
    id: gesamt_stromverbrauch
    entity_id: sensor.gesamt_stromverbrauch_in_kwh
    on_value:
      - lvgl.label.update:
          id: val_gesamt
          text:
            format: "%.1f kW"
            args: [x]
      - lambda: |-
          int w = (int)(x + 0.5f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_pv_haus)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 0;'
          then:
            - lvgl.widget.show:
                id: line_pv_haus
          else:
            - lvgl.widget.hide:
                id: line_pv_haus

  - platform: homeassistant
    id: hausverbrauch_ohne_wp
    entity_id: sensor.hausverbrauch_ohne_wp
    on_value:
      - lvgl.label.update:
          id: val_hauswp
          text:
            format: "%.1f kW"
            args: [x]

  - platform: homeassistant
    id: batterie_ladeleistung
    entity_id: sensor.batterie_ladeleistung_entladeleistung
    on_value:
      - lambda: |-
          int w = (int)(x / 1000.0f + 0.5f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_pv_akku)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 50;'
          then:
            - lvgl.widget.show:
                id: line_pv_akku
          else:
            - lvgl.widget.hide:
                id: line_pv_akku
      - if:
          condition:
            lambda: 'return x < -50;'
          then:
            - lvgl.widget.show:
                id: line_akku_haus
          else:
            - lvgl.widget.hide:
                id: line_akku_haus

  - platform: homeassistant
    id: byd_battery_box_premium_hv_state_of_charge
    entity_id: sensor.byd_battery_box_premium_hv_state_of_charge
    on_value:
      - lvgl.label.update:
          id: val_akku
          text:
            format: "%.0f%%"
            args: [x]
      # Updates the visual Arc matching the battery percentage!
      - lvgl.arc.update:
          id: arc_akku
          value: !lambda 'return x;'

  - platform: homeassistant
    id: pv
    entity_id: sensor.solarnet_power_photovoltaics
    on_value:
      - lvgl.label.update:
          id: val_pv
          text:
            format: "%.1f kW"
            args: [x/1000]

  - platform: homeassistant
    id: netzbezug
    entity_id: sensor.solarnet_power_grid_import
    on_value:
      - lvgl.label.update:
          id: val_netz
          text:
            format: "%.1f kW"
            args: [x/1000]
      - lambda: |-
          int w = (int)(x / 1000.0f + 0.5f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_netz_haus)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 50;'
          then:
            - lvgl.widget.show:
                id: line_netz_haus
          else:
            - lvgl.widget.hide:
                id: line_netz_haus

  - platform: homeassistant
    id: pv_eingespeist
    entity_id: sensor.solarnet_power_grid_export
    on_value:
      - lvgl.label.update:
          id: val_eingespeist
          text:
            format: "%.1f kW"
            args: [x/1000]
      - lambda: |-
          int w = (int)(x / 1000.0f + 0.5f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_pv_einspeisung)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 50;'
          then:
            - lvgl.widget.show:
                id: line_pv_einspeisung
          else:
            - lvgl.widget.hide:
                id: line_pv_einspeisung

  - platform: homeassistant
    id: wp
    entity_id: sensor.strom_warmpumpe_in_kwh
    on_value:
      - lvgl.label.update:
          id: val_wp
          text:
            format: "%.1f kW"
            args: [x]
      - lambda: |-
          int w = (int)(x * 3.0f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_haus_wp)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 0;'
          then:
            - lvgl.widget.show:
                id: line_haus_wp
          else:
            - lvgl.widget.hide:
                id: line_haus_wp

  - platform: homeassistant
    id: wattpilot_charging_power
    entity_id: sensor.wattpilot_charging_power
    on_value:
      - lambda: |-
          int w = (int)(x / 1000.0f + 0.5f);
          if (w < 1) w = 1;
          if (w > 10) w = 10;
          lv_obj_set_style_line_width(id(line_haus_buzz)->obj, w, (lv_style_selector_t)LV_PART_MAIN | (lv_style_selector_t)LV_STATE_DEFAULT);
      - if:
          condition:
            lambda: 'return x > 50;'
          then:
            - lvgl.widget.show:
                id: line_haus_buzz
          else:
            - lvgl.widget.hide:
                id: line_haus_buzz

  - platform: homeassistant
    id: tagliche_wp_heizzyklen
    entity_id: sensor.tagliche_wp_heizzyklen
    on_value:
      - lvgl.label.update:
          id: val_wp_zyklen
          text:
            format: "Heute: %.0f Starts"
            args: [x]

  - platform: homeassistant
    id: ww_temperatur
    entity_id: sensor.hybrox_11_grail_dhw
    on_value:
      - lvgl.label.update:
          id: val_wasser
          text:
            format: "%.1f °C"
            args: [x]

  - platform: homeassistant
    id: buzz_battery_level
    entity_id: sensor.buzz_battery_level
    on_value:
      - lvgl.label.update:
          id: val_buzz
          text:
            format: "%.0f%%"
            args: [x]
      - lvgl.arc.update:
          id: arc_buzz
          value: !lambda 'return x;'

interval:
  - interval: 1s
    then:
      - lambda: |-
          bool vis_haus = !lv_obj_has_flag(id(line_pv_haus)->obj, LV_OBJ_FLAG_HIDDEN);
          bool vis_akku = !lv_obj_has_flag(id(line_pv_akku)->obj, LV_OBJ_FLAG_HIDDEN);
          bool vis_wp   = !lv_obj_has_flag(id(line_haus_wp)->obj, LV_OBJ_FLAG_HIDDEN);
          bool vis_netz = !lv_obj_has_flag(id(line_netz_haus)->obj, LV_OBJ_FLAG_HIDDEN);
          bool vis_buzz = !lv_obj_has_flag(id(line_haus_buzz)->obj, LV_OBJ_FLAG_HIDDEN);
          int step = id(live_anim_step);
          lv_obj_t* dashes_haus[3] = {
            id(line_pv_haus_d0)->obj,
            id(line_pv_haus_d1)->obj,
            id(line_pv_haus_d2)->obj,
          };
          lv_obj_t* dashes_akku[3] = {
            id(line_pv_akku_d0)->obj,
            id(line_pv_akku_d1)->obj,
            id(line_pv_akku_d2)->obj,
          };
          lv_obj_t* dashes_wp[3] = {
            id(line_haus_wp_d0)->obj,
            id(line_haus_wp_d1)->obj,
            id(line_haus_wp_d2)->obj,
          };
          lv_obj_t* dashes_netz[3] = {
            id(line_netz_haus_d0)->obj,
            id(line_netz_haus_d1)->obj,
            id(line_netz_haus_d2)->obj,
          };
          lv_obj_t* dashes_buzz[3] = {
            id(line_haus_buzz_d0)->obj,
            id(line_haus_buzz_d1)->obj,
            id(line_haus_buzz_d2)->obj,
          };
          for (int i = 0; i < 3; i++) {
            if (vis_haus && i == step)
              lv_obj_clear_flag(dashes_haus[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(dashes_haus[i], LV_OBJ_FLAG_HIDDEN);
            if (vis_akku && i == step)
              lv_obj_clear_flag(dashes_akku[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(dashes_akku[i], LV_OBJ_FLAG_HIDDEN);
            if (vis_wp && i == step)
              lv_obj_clear_flag(dashes_wp[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(dashes_wp[i], LV_OBJ_FLAG_HIDDEN);
            if (vis_netz && i == step)
              lv_obj_clear_flag(dashes_netz[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(dashes_netz[i], LV_OBJ_FLAG_HIDDEN);
            if (vis_buzz && i == step)
              lv_obj_clear_flag(dashes_buzz[i], LV_OBJ_FLAG_HIDDEN);
            else
              lv_obj_add_flag(dashes_buzz[i], LV_OBJ_FLAG_HIDDEN);
          }
          if (vis_haus || vis_akku || vis_wp || vis_netz || vis_buzz) id(live_anim_step) = (step + 1) % 3;

