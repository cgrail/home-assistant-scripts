
time:
  - platform: homeassistant
    id: time_comp

# Only update the clock on an interval now
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: label_clock
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: label_date
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--.--.----");
            const char* days[] = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s, %02d.%02d.%04d", days[now.day_of_week - 1], now.day_of_month, now.month, now.year);
            return std::string(buf);

sensor:
  - platform: homeassistant
    id: weather_temperature
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: label_weather_temp
          text:
            format: "%.0f °C"
            args: [x]

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      - lambda: |-
          const char* display;
          const char* icon;
          if (x == "sunny")              { display = "Sonnig";          icon = "\xF3\xB0\x96\x99"; }
          else if (x == "clear-night")   { display = "Klar";            icon = "\xF3\xB0\x96\x94"; }
          else if (x == "partlycloudy") { display = "Teils bewölkt";   icon = "\xF3\xB0\x96\x95"; }
          else if (x == "cloudy")        { display = "Bewölkt";         icon = "\xF3\xB0\x96\x90"; }
          else if (x == "rainy")         { display = "Regen";           icon = "\xF3\xB0\x96\x97"; }
          else if (x == "pouring")       { display = "Starkregen";      icon = "\xF3\xB0\x96\x96"; }
          else if (x == "snowy")         { display = "Schnee";          icon = "\xF3\xB0\x96\x98"; }
          else if (x == "snowy-rainy")   { display = "Schneeregen";     icon = "\xF3\xB0\x99\xBF"; }
          else if (x == "lightning")     { display = "Gewitter";        icon = "\xF3\xB0\x96\x93"; }
          else if (x == "lightning-rainy") { display = "Gewitterregen"; icon = "\xF3\xB0\x99\xBE"; }
          else if (x == "fog")           { display = "Nebel";           icon = "\xF3\xB0\x96\x91"; }
          else if (x == "windy")         { display = "Windig";          icon = "\xF3\xB0\x96\x9D"; }
          else if (x == "windy-variant") { display = "Windig";          icon = "\xF3\xB0\x96\x9E"; }
          else if (x == "hail")          { display = "Hagel";           icon = "\xF3\xB0\x96\x92"; }
          else if (x == "exceptional")   { display = "Außergewöhnlich"; icon = "\xF3\xB0\x96\x90"; }
          else                           { display = x.c_str();         icon = "\xF3\xB0\x96\x90"; }
          lv_label_set_text(id(label_weather_condition), display);
          lv_label_set_text(id(label_weather_icon), icon);

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_weather_36
    size: 36
    glyphs:
      - "\U000F0590"  # weather-cloudy
      - "\U000F0591"  # weather-fog
      - "\U000F0592"  # weather-hail
      - "\U000F0593"  # weather-lightning
      - "\U000F0594"  # weather-night
      - "\U000F0595"  # weather-partly-cloudy
      - "\U000F0596"  # weather-pouring
      - "\U000F0597"  # weather-rainy
      - "\U000F0598"  # weather-snowy
      - "\U000F0599"  # weather-sunny
      - "\U000F059D"  # weather-windy
      - "\U000F059E"  # weather-windy-variant
      - "\U000F067E"  # weather-lightning-rainy
      - "\U000F067F"  # weather-snowy-rainy
  - file: "gfonts://Montserrat"
    id: montserrat_48_temp
    size: 48
    glyphs: " 0123456789.-°C"

lvgl:
  widgets:
    # ── HEADER ─────────────────────────────────────────────────────────────────
    - obj:
        x: 0
        y: 0
        width: 800
        height: 70
        bg_color: 0x0B1120
        radius: 0
        border_width: 0
        pad_all: 0
        widgets:
          - label:
              id: label_clock
              x: 20
              y: 11
              text: "--:--"
              text_font: montserrat_48
