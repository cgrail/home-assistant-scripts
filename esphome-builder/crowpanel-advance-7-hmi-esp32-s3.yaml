lvgl:
  log_level: INFO
  color_depth: 16
  # Very dark slate background for the whole screen
  bg_color: 0x0B1120 
  buffer_size: 10%
  full_refresh: false
  text_font: montserrat_20
  widgets:

    # ── HEADER ─────────────────────────────────────────────────────────────────
    - obj:
        x: 0
        y: 0
        width: 800
        height: 70
        bg_color: 0x0B1120
        radius: 0
        border_width: 0
        pad_all: 0
        widgets:
          - label:
              id: label_clock
              x: 20
              y: 10
              text: "--:--"
              text_font: montserrat_48
              text_color: 0xE2E8F0 # Bright Slate
          - label:
              id: label_date
              x: 160
              y: 32
              text: "..."
              text_font: montserrat_20
              text_color: 0x64748B # Muted Slate
          - label:
