text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_home
    on_value:
      - lambda: |-
          const char* display;
          const char* icon;
          if (x == "sunny")              { display = "Sonnig";          icon = "\xF3\xB0\x96\x99"; }
          else if (x == "clear-night")   { display = "Klar";            icon = "\xF3\xB0\x96\x94"; }
          else if (x == "partlycloudy") { display = "Teils bewölkt";   icon = "\xF3\xB0\x96\x95"; }
          else if (x == "cloudy")        { display = "Bewölkt";         icon = "\xF3\xB0\x96\x90"; }
          else if (x == "rainy")         { display = "Regen";           icon = "\xF3\xB0\x96\x97"; }
          else if (x == "pouring")       { display = "Starkregen";      icon = "\xF3\xB0\x96\x96"; }
          else if (x == "snowy")         { display = "Schnee";          icon = "\xF3\xB0\x96\x98"; }
          else if (x == "snowy-rainy")   { display = "Schneeregen";     icon = "\xF3\xB0\x99\xBF"; }
          else if (x == "lightning")     { display = "Gewitter";        icon = "\xF3\xB0\x96\x93"; }
          else if (x == "lightning-rainy") { display = "Gewitterregen"; icon = "\xF3\xB0\x99\xBE"; }
          else if (x == "fog")           { display = "Nebel";           icon = "\xF3\xB0\x96\x91"; }
          else if (x == "windy")         { display = "Windig";          icon = "\xF3\xB0\x96\x9D"; }
          else if (x == "windy-variant") { display = "Windig";          icon = "\xF3\xB0\x96\x9E"; }
          else if (x == "hail")          { display = "Hagel";           icon = "\xF3\xB0\x96\x92"; }
          else if (x == "exceptional")   { display = "Außergewöhnlich"; icon = "\xF3\xB0\x96\x90"; }
          else                           { display = x.c_str();         icon = "\xF3\xB0\x96\x90"; }
          lv_label_set_text(id(label_weather_condition), display);
          lv_label_set_text(id(label_weather_icon), icon);
  - platform: homeassistant
    id: zuzenhausen_departures_raw
    entity_id: sensor.zuzenhausen_abfahrten_esphome
    on_value:
      - lambda: |-
          auto json_get = [](const std::string& s, const std::string& key, int nth) -> std::string {
            std::string needle = "\"" + key + "\"";
            size_t pos = 0;
            for (int i = 0; i <= nth; i++) {
              pos = s.find(needle, pos);
              if (pos == std::string::npos) return "--";
              if (i < nth) pos += needle.size();
            }
            pos = s.find(':', pos + needle.size());
            if (pos == std::string::npos) return "--";
            pos++;
            while (pos < s.size() && s[pos] == ' ') pos++;
            if (pos >= s.size()) return "--";
            if (s[pos] == '"') {
              pos++;
              size_t end = s.find('"', pos);
              return (end == std::string::npos) ? "--" : s.substr(pos, end - pos);
            }
            size_t end = s.find_first_of(",]}", pos);
            std::string val = (end == std::string::npos) ? s.substr(pos) : s.substr(pos, end - pos);
            while (!val.empty() && val.back() == ' ') val.pop_back();
            return val;
          };
          auto fmt_delay = [](const std::string& d) -> std::string {
            if (d == "--") return "--";
            int n = static_cast<int>(atof(d.c_str()));
            if (n == 0) return "p\xc3\xbcnktl.";
            char buf[12];
            snprintf(buf, sizeof(buf), n > 0 ? "+%d min" : "%d min", n);
            return std::string(buf);
          };
          std::string d1_time  = json_get(x, "departure_current", 0);
          std::string d1_delay = fmt_delay(json_get(x, "delay", 0));
          std::string d1_dir   = json_get(x, "richtung", 0);
          std::string d2_time  = json_get(x, "departure_current", 1);
          std::string d2_delay = fmt_delay(json_get(x, "delay", 1));
          std::string d2_dir   = json_get(x, "richtung", 1);
          lv_label_set_text(id(val_dep1_time),  d1_time.c_str());
          lv_label_set_text(id(val_dep1_delay), d1_delay.c_str());
          lv_label_set_text(id(val_dep1_dir),   d1_dir.c_str());
          lv_label_set_text(id(val_dep2_time),  d2_time.c_str());
          lv_label_set_text(id(val_dep2_delay), d2_delay.c_str());
          lv_label_set_text(id(val_dep2_dir),   d2_dir.c_str());

