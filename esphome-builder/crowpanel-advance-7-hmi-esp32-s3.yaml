esphome:
  name: crowpanel-advance-7-hmi
  friendly_name: CrowPanel Advance 7 HMI| ESP32-S3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "UfpvcAWF+sV5++k0lwU1Yy200QUIrcqmxUvIcI4Ux8g="

ota:
  - platform: esphome
    password: "e5618d93a59a898fc767c978134dd58c"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Crowpanel-Advance-7-Hmi-Esp32-S3"
    password: "k9up9gRvf6ri"

captive_portal:
switch:
  - platform: template
    name: "Backlight Power"
    id: backlight_switch
    turn_on_action:
      - lambda: |-
          uint8_t cmd[1] = { 0 };
          id(bus_a).write(0x30, cmd, 1);
    turn_off_action:
      - lambda: |-
          uint8_t cmd[1] = { 245 };
          id(bus_a).write(0x30, cmd, 1);


i2c:
  sda: 15
  scl: 16
  scan: true
  id: bus_a

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: 42
    hsync_pin: 40
    vsync_pin: 41
    pclk_pin: 39
    pclk_frequency: 20MHz
    hsync_pulse_width: 4
    hsync_front_porch: 8
    hsync_back_porch: 8
    vsync_pulse_width: 4
    vsync_front_porch: 8
    vsync_back_porch: 8
    data_pins:
      red:
        - 7
        - 17
        - 18
        - 3
        - 46
      green:
        - 9
        - 10
        - 11
        - 12
        - 13
        - 14
      blue:
        - 21
        - 47
        - 48
        - 45
        - 38

time:
  - platform: homeassistant
    id: time_comp

interval:
  - interval: 10s
    then:
      - lvgl.label.update:
          id: label_clock
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: label_date
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--.--.----");
            const char* days[] = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s, %02d.%02d.%04d", days[now.day_of_week - 1], now.day_of_month, now.month, now.year);
            return std::string(buf);

