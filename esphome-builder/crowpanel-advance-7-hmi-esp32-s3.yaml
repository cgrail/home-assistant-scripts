esphome:
  name: crowpanel-advance-7-hmi
  friendly_name: CrowPanel Advance 7 HMI| ESP32-S3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Crowpanel-Advance-7-Hmi-Esp32-S3"
    password: "k9up9gRvf6ri"

captive_portal:

switch:
  - platform: template
    name: "Backlight Power"
    id: backlight_switch
    turn_on_action:
      - lambda: |-
          uint8_t cmd[1] = { 0 };
          id(bus_a).write(0x30, cmd, 1);
    turn_off_action:
      - lambda: |-
          uint8_t cmd[1] = { 245 };
          id(bus_a).write(0x30, cmd, 1);

spi:
  clk_pin: 1
  mosi_pin: 2

i2c:
  sda: 15
  scl: 16
  scan: true
  id: bus_a

display:
  - platform: mipi_rgb
    id: main_display
    model: custom
    init_sequence: []
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: 42
    hsync_pin: 40
    vsync_pin: 41
    pclk_pin: 39
    pclk_frequency: 16MHz
    hsync_pulse_width: 4
    hsync_front_porch: 8
    hsync_back_porch: 8
    vsync_pulse_width: 4
    vsync_front_porch: 8
    vsync_back_porch: 8
    data_pins:
      red: [7, 17, 18, 3, 46]
      green: [9, 10, 11, 12, 13, 14]
      blue: [21, 47, 48, 45, 38]

time:
  - platform: homeassistant
    id: time_comp

# Only update the clock on an interval now
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: label_clock
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: label_date
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--.--.----");
            const char* days[] = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s, %02d.%02d.%04d", days[now.day_of_week - 1], now.day_of_month, now.month, now.year);
            return std::string(buf);

sensor:
  - platform: homeassistant
    id: gesamt_stromverbrauch
    entity_id: sensor.gesamt_stromverbrauch_in_kwh
    on_value:
      - lvgl.label.update:
          id: val_gesamt
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", x); return std::string(buf);'

  - platform: homeassistant
    id: hausverbrauch_ohne_wp
    entity_id: sensor.hausverbrauch_ohne_wp
    on_value:
      - lvgl.label.update:
          id: val_hauswp
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", x); return std::string(buf);'

  - platform: homeassistant
    id: byd_battery_box_premium_hv_state_of_charge
    entity_id: sensor.byd_battery_box_premium_hv_state_of_charge
    on_value:
      - lvgl.label.update:
          id: val_akku
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f %%", x); return std::string(buf);'
      # Updates the visual Arc matching the battery percentage!
      - lvgl.arc.update:
          id: arc_akku
          value: !lambda 'return x;'

  - platform: homeassistant
    id: taglicher_stromverbrauch
    entity_id: sensor.taglicher_stromvebrauch
    on_value:
      - lvgl.label.update:
          id: val_heute
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", x); return std::string(buf);'

  - platform: homeassistant
    id: tag_wp
    entity_id: sensor.taglich_wp_gesamt
    on_value:
      - lvgl.label.update:
          id: val_tag_wp
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", x); return std::string(buf);'

  - platform: homeassistant
    id: tagliche_pv_produktion
    entity_id: sensor.tagliche_pv_produktion
    on_value:
      - lvgl.label.update:
          id: val_pv_heute
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", x); return std::string(buf);'

  - platform: homeassistant
    id: taglich_eingespeist
    entity_id: sensor.taglich_eingespeist
    on_value:
      - lvgl.label.update:
          id: val_ein_heute
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", x); return std::string(buf);'

  - platform: homeassistant
    id: ww_temperatur
    entity_id: sensor.hybrox_11_grail_dhw
    on_value:
      - lvgl.label.update:
          id: val_wasser
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.1f °C", x); return std::string(buf);'

  - platform: homeassistant
    id: buzz_battery_level
    entity_id: sensor.buzz_battery_level
    on_value:
      - lvgl.label.update:
          id: val_buzz
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.0f %%", x); return std::string(buf);'
      - lvgl.arc.update:
          id: arc_buzz
          value: !lambda 'return x;'

  - platform: homeassistant
    id: weather_temperature
    entity_id: weather.forecast_home
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: label_weather_temp
          text: !lambda 'char buf[20]; snprintf(buf, sizeof(buf), "%.0f \xc2\xb0" "C", x); return std::string(buf);'

text_sensor:
  - platform: homeassistant
    id: zuzenhausen_departures_raw
    entity_id: sensor.zuzenhausen_abfahrten_esphome
    on_value:
      - lambda: |-
          auto json_get = [](const std::string& s, const std::string& key, int nth) -> std::string {
            std::string needle = "\"" + key + "\"";
            size_t pos = 0;
            for (int i = 0; i <= nth; i++) {
              pos = s.find(needle, pos);
              if (pos == std::string::npos) return "--";
              if (i < nth) pos += needle.size();
            }
            pos = s.find(':', pos + needle.size());
            if (pos == std::string::npos) return "--";
            pos++;
            while (pos < s.size() && s[pos] == ' ') pos++;
            if (pos >= s.size()) return "--";
            if (s[pos] == '"') {
              pos++;
              size_t end = s.find('"', pos);
              return (end == std::string::npos) ? "--" : s.substr(pos, end - pos);
            }
            size_t end = s.find_first_of(",]}", pos);
            std::string val = (end == std::string::npos) ? s.substr(pos) : s.substr(pos, end - pos);
            while (!val.empty() && val.back() == ' ') val.pop_back();
            return val;
          };
          auto fmt_delay = [](const std::string& d) -> std::string {
            if (d == "--") return "--";
            int n = static_cast<int>(atof(d.c_str()));
            if (n == 0) return "p\xc3\xbcnktl.";
            char buf[12];
            snprintf(buf, sizeof(buf), n > 0 ? "+%d min" : "%d min", n);
            return std::string(buf);
          };
          std::string d1_time  = json_get(x, "departure_current", 0);
          std::string d1_delay = fmt_delay(json_get(x, "delay", 0));
          std::string d1_dir   = json_get(x, "richtung", 0);
          std::string d2_time  = json_get(x, "departure_current", 1);
          std::string d2_delay = fmt_delay(json_get(x, "delay", 1));
          std::string d2_dir   = json_get(x, "richtung", 1);
          lv_label_set_text(id(val_dep1_time),  d1_time.c_str());
          lv_label_set_text(id(val_dep1_delay), d1_delay.c_str());
          lv_label_set_text(id(val_dep1_dir),   d1_dir.c_str());
          lv_label_set_text(id(val_dep2_time),  d2_time.c_str());
          lv_label_set_text(id(val_dep2_delay), d2_delay.c_str());
          lv_label_set_text(id(val_dep2_dir),   d2_dir.c_str());

