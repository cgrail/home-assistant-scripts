esphome:
  name: crowpanel-advance-7-hmi
  friendly_name: CrowPanel Advance 7 HMI| ESP32-S3

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "UfpvcAWF+sV5++k0lwU1Yy200QUIrcqmxUvIcI4Ux8g="

ota:
  - platform: esphome
    password: "e5618d93a59a898fc767c978134dd58c"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Crowpanel-Advance-7-Hmi-Esp32-S3"
    password: "k9up9gRvf6ri"

captive_portal:
switch:
  - platform: template
    name: "Backlight Power"
    id: backlight_switch
    turn_on_action:
      - lambda: |-
          uint8_t cmd[1] = { 0 };
          id(bus_a).write(0x30, cmd, 1);
    turn_off_action:
      - lambda: |-
          uint8_t cmd[1] = { 245 };
          id(bus_a).write(0x30, cmd, 1);


spi:
  clk_pin: 1
  mosi_pin: 2

i2c:
  sda: 15
  scl: 16
  scan: true
  id: bus_a

display:
  - platform: mipi_rgb
    id: main_display
    model: custom
    init_sequence: []
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: 42
    hsync_pin: 40
    vsync_pin: 41
    pclk_pin: 39
    pclk_frequency: 20MHz
    hsync_pulse_width: 4
    hsync_front_porch: 8
    hsync_back_porch: 8
    vsync_pulse_width: 4
    vsync_front_porch: 8
    vsync_back_porch: 8
    data_pins:
      red:
        - 7
        - 17
        - 18
        - 3
        - 46
      green:
        - 9
        - 10
        - 11
        - 12
        - 13
        - 14
      blue:
        - 21
        - 47
        - 48
        - 45
        - 38

time:
  - platform: homeassistant
    id: time_comp

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: val_gesamt
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", id(gesamt_stromverbrauch).state); return std::string(buf);
      - lvgl.label.update:
          id: val_hauswp
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", id(hausverbrauch_ohne_wp).state); return std::string(buf);
      - lvgl.label.update:
          id: val_pv
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", id(pv).state / 1000.0); return std::string(buf);
      - lvgl.label.update:
          id: val_akku
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f %%", id(byd_battery_box_premium_hv_state_of_charge).state); return std::string(buf);
      - lvgl.label.update:
          id: val_netz
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", id(netzbezug).state / 1000.0); return std::string(buf);
      - lvgl.label.update:
          id: val_eingespeist
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kW", id(pv_eingespeist).state / 1000.0); return std::string(buf);
      - lvgl.label.update:
          id: val_heute
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", id(taglicher_stromverbrauch).state); return std::string(buf);
      - lvgl.label.update:
          id: val_tag_wp
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", id(tag_wp).state); return std::string(buf);
      - lvgl.label.update:
          id: val_pv_heute
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", id(tagliche_pv_produktion).state); return std::string(buf);
      - lvgl.label.update:
          id: val_ein_heute
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f kWh", id(taglich_eingespeist).state); return std::string(buf);
      - lvgl.label.update:
          id: val_wasser
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f C", id(ww_temperatur).state); return std::string(buf);
      - lvgl.label.update:
          id: val_zyklen
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.0f", id(heizzyklen).state); return std::string(buf);
      - lvgl.label.update:
          id: val_buzz
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.0f %%", id(buzz_battery_level).state); return std::string(buf);
      - lvgl.label.update:
          id: val_buzz_gesamt
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.1f mWh", id(buzz_gesamt_geladen).state); return std::string(buf);
      - lvgl.label.update:
          id: label_weather_temp
          text: !lambda |-
            char buf[20]; snprintf(buf, sizeof(buf), "%.0f°C", id(weather_temperature).state); return std::string(buf);
  - interval: 10s
    then:
      - lvgl.label.update:
          id: label_clock
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: label_date
          text: !lambda |-
            auto now = id(time_comp).now();
            if (!now.is_valid()) return std::string("--.--.----");
            const char* days[] = {"So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"};
            char buf[24];
            snprintf(buf, sizeof(buf), "%s, %02d.%02d.%04d", days[now.day_of_week - 1], now.day_of_month, now.month, now.year);
            return std::string(buf);

sensor:
  - platform: homeassistant
    id: gesamt_stromverbrauch
    entity_id: sensor.gesamt_stromverbrauch_in_kwh
  - platform: homeassistant
    id: hausverbrauch_ohne_wp
    entity_id: sensor.hausverbrauch_ohne_wp
  - platform: homeassistant
    id: pv
    entity_id: sensor.solarnet_power_photovoltaics
  - platform: homeassistant
    id: byd_battery_box_premium_hv_state_of_charge
    entity_id: sensor.byd_battery_box_premium_hv_state_of_charge
  - platform: homeassistant
    id: netzbezug
    entity_id: sensor.solarnet_power_grid_import
  - platform: homeassistant
    id: pv_eingespeist
    entity_id: sensor.solarnet_power_grid_export
  - platform: homeassistant
    id: taglicher_stromverbrauch
    entity_id: sensor.taglicher_stromvebrauch
  - platform: homeassistant
    id: tag_wp
    entity_id: sensor.taglich_wp_gesamt
  - platform: homeassistant
    id: tagliche_pv_produktion
    entity_id: sensor.tagliche_pv_produktion
  - platform: homeassistant
    id: taglich_eingespeist
    entity_id: sensor.taglich_eingespeist
  - platform: homeassistant
    id: ww_temperatur
    entity_id: sensor.hybrox_11_grail_dhw
  - platform: homeassistant
    id: heizzyklen
    entity_id: sensor.tagliche_wp_heizzyklen
  - platform: homeassistant
    id: buzz_battery_level
    entity_id: sensor.buzz_battery_level
  - platform: homeassistant
    id: buzz_gesamt_geladen
    entity_id: sensor.wattpilot_gesamt
  - platform: homeassistant
    id: weather_temperature
    entity_id: weather.forecast_home
    attribute: temperature

